<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>ICT Exoticz – Daily Deals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Clash Display';
      src: url('/fonts/ClashDisplay-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg:            #050509;
      --glass-bg:      rgba(255, 255, 255, 0.05);
      --glass-bg-2:    rgba(255, 255, 255, 0.09);
      --glass-border:  rgba(255, 255, 255, 0.12);
      --glass-blur:    blur(32px) saturate(180%);
      --accent:        #06B6D4;
      --accent-hover:  #22D3EE;
      --accent-dim:    rgba(6, 182, 212, 0.12);
      --accent-glow:   rgba(6, 182, 212, 0.28);
      --nebula-blue:   rgba(6, 182, 212, 0.13);
      --nebula-violet: rgba(139, 92, 246, 0.14);
      --nebula-teal:   rgba(20, 184, 166, 0.10);
      --text-1:        #EEF2FF;
      --text-2:        #8892B0;
      --text-3:        #4A5580;
      --radius-sm:     8px;
      --radius-md:     16px;
      --radius-lg:     24px;
      --shadow-glass:  0 8px 32px rgba(0, 0, 0, 0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Nunito Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background layers ── */
    #starfield {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    .nebula-layer {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .nebula { position: absolute; border-radius: 50%; filter: blur(100px); }
    .n1 { width: 900px; height: 600px; background: var(--nebula-violet); top: -250px; right: -200px; }
    .n2 { width: 700px; height: 700px; background: var(--nebula-blue);   top: 35%;   left: -250px; }
    .n3 { width: 600px; height: 500px; background: var(--nebula-teal);   bottom: 5%; right: 5%; }

    /* ── Screen layout ── */
    .screen {
      position: relative; z-index: 1;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      padding: 2.25rem 2.75rem;
      gap: 1.75rem;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      display: flex; align-items: center; gap: 0.85rem;
    }
    .logo-img {
      width: 72px; height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(6, 182, 212, 0.7));
    }
    .logo-text {
      font-size: 2.1rem; font-weight: 800;
      font-family: 'Nunito Sans', sans-serif;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .logo-ict     { color: var(--accent); font-family: 'Clash Display', sans-serif; font-weight: 700; }
    .logo-exoticz { font-family: 'Permanent Marker', cursive; font-weight: 400; color: var(--text-1); }

    .header-center { text-align: center; }
    .header-eyebrow {
      font-family: 'Clash Display', sans-serif;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }
    .header-title {
      font-family: 'Clash Display', sans-serif;
      font-size: 3rem; font-weight: 800;
      color: var(--text-1); line-height: 1;
    }

    .clock-block { text-align: right; }
    .clock-time {
      font-family: 'Clash Display', sans-serif;
      font-size: 2.6rem; font-weight: 700;
      color: var(--text-1); line-height: 1;
    }
    .clock-date {
      font-size: 0.95rem; font-weight: 600;
      color: var(--text-2);
      margin-top: 0.3rem;
    }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      display: grid;
      grid-template-columns: 1.45fr 1fr;
      gap: 1.5rem;
      min-height: 0;
    }

    /* ── Today's deal ── */
    .today-card {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius-lg);
      box-shadow:
        0 0 70px rgba(6, 182, 212, 0.18),
        0 8px 32px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      padding: 3.5rem 4rem;
      display: flex; flex-direction: column; justify-content: center;
      position: relative; overflow: hidden;
    }
    .today-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.06) 0%, transparent 55%);
      pointer-events: none;
    }

    .today-badge {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-family: 'Clash Display', sans-serif;
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent);
      background: rgba(6, 182, 212, 0.1);
      border: 1px solid var(--accent);
      padding: 0.4rem 1.1rem; border-radius: 100px;
      margin-bottom: 2.25rem;
      width: fit-content;
      animation: badge-pulse 2.2s ease-in-out infinite;
    }
    @keyframes badge-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
      50%       { box-shadow: 0 0 0 8px rgba(6, 182, 212, 0.1); }
    }

    .pulse-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent);
      animation: dot-blink 1.4s ease-in-out infinite;
    }
    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    .today-days {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 1.15rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 0.4rem;
    }

    .today-discount {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(5rem, 9.5vw, 10rem);
      font-weight: 800; line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 100px rgba(6, 182, 212, 0.45);
      margin-bottom: 0.6rem;
    }

    .today-desc {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(1.6rem, 2.8vw, 2.8rem);
      font-weight: 700; line-height: 1.2;
      color: var(--text-1);
    }

    /* ── Other deals (right column) ── */
    .other-deals {
      display: flex; flex-direction: column; gap: 1rem;
    }

    .deal-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-glass), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      padding: 1.6rem 2rem;
      display: flex; align-items: center; gap: 2rem;
      flex: 1; min-height: 0;
      position: relative; overflow: hidden;
    }
    .deal-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .deal-day-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-3);
      min-width: 100px; flex-shrink: 0;
    }

    .deal-divider {
      width: 1px; height: 2.5rem;
      background: var(--glass-border);
      flex-shrink: 0;
    }

    .deal-discount-sm {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(1.9rem, 2.8vw, 2.8rem);
      font-weight: 800; line-height: 1;
      color: var(--text-2);
      min-width: 130px; flex-shrink: 0;
    }

    .deal-desc-sm {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(0.95rem, 1.4vw, 1.25rem);
      font-weight: 700; line-height: 1.3;
      color: var(--text-2);
    }

    /* ── Footer ── */
    .footer-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      padding-top: 1rem;
      border-top: 1px solid var(--glass-border);
    }
    .footer-bar .disclaimer {
      font-size: 0.8rem; color: var(--text-3);
      max-width: 720px; line-height: 1.5;
    }
    .footer-review {
      display: flex; align-items: center; gap: 0.65rem;
      font-family: 'Clash Display', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      color: var(--text-2);
      white-space: nowrap;
    }
    .footer-review .g-icon {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <canvas id="starfield" aria-hidden="true"></canvas>

  <div class="nebula-layer" aria-hidden="true">
    <div class="nebula n1"></div>
    <div class="nebula n2"></div>
    <div class="nebula n3"></div>
  </div>

  <div class="screen">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="/astronaut-3d.png" alt="" class="logo-img" />
        <span class="logo-text">
          <span class="logo-ict">ICT</span><span class="logo-exoticz">Exoticz</span>
        </span>
      </div>

      <div class="header-center">
        <div class="header-eyebrow">Save Every Day</div>
        <div class="header-title">Daily Deals</div>
      </div>

      <div class="clock-block">
        <div class="clock-time" id="clock">—</div>
        <div class="clock-date"  id="date">—</div>
      </div>
    </header>

    <!-- Deals -->
    <div class="main-content">

      <!-- Today's big deal -->
      <div class="today-card">
        <div class="today-badge">
          <span class="pulse-dot"></span>
          Today's Deal
        </div>
        <div class="today-days"     id="today-days">—</div>
        <div class="today-discount" id="today-discount">—</div>
        <div class="today-desc"     id="today-desc">—</div>
      </div>

      <!-- Other days -->
      <div class="other-deals" id="other-deals"></div>

    </div>

    <!-- Footer -->
    <div class="footer-bar">
      <p class="disclaimer">Must be 21+ to purchase herb and tobacco products &middot; All products sold in compliance with applicable state and federal law</p>
      <div class="footer-review">
        <div class="g-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </div>
        Leave Us a Google Review
      </div>
    </div>

  </div>

  <script>
    // ── Deal data ──
    const DEALS = [
      { days: [1, 4], label: 'Monday & Thursday', discount: '10% OFF', desc: 'All Edibles' },
      { days: [2, 5], label: 'Tuesday & Friday',  discount: '10% OFF', desc: 'Loose Leaf Sale' },
      { days: [3, 6], label: 'Wednesday & Saturday', discount: 'BOGO', desc: 'Buy 1/8 of Wax, get 1g free — or 10% off' },
      { days: [0],    label: 'Sunday',            discount: '10% OFF', desc: 'All Herbal Vapes' },
    ];

    function populate() {
      const today = new Date().getDay();
      const todayDeal  = DEALS.find(d => d.days.includes(today));
      const otherDeals = DEALS.filter(d => !d.days.includes(today));

      if (todayDeal) {
        document.getElementById('today-days').textContent     = todayDeal.label;
        document.getElementById('today-discount').textContent = todayDeal.discount;
        document.getElementById('today-desc').textContent     = todayDeal.desc;
      }

      const container = document.getElementById('other-deals');
      container.innerHTML = '';
      otherDeals.forEach(deal => {
        const card = document.createElement('div');
        card.className = 'deal-card';
        card.innerHTML = `
          <span class="deal-day-label">${deal.label}</span>
          <span class="deal-divider"></span>
          <span class="deal-discount-sm">${deal.discount}</span>
          <span class="deal-desc-sm">${deal.desc}</span>
        `;
        container.appendChild(card);
      });
    }

    // ── Clock ──
    function updateClock() {
      const now  = new Date();
      const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      const date = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      document.getElementById('clock').textContent = time;
      document.getElementById('date').textContent  = date;
    }

    // Reload at midnight so today's deal flips automatically
    function scheduleReload() {
      const now      = new Date();
      const midnight = new Date(now);
      midnight.setHours(24, 0, 5, 0); // 5s past midnight
      setTimeout(() => location.reload(), midnight - now);
    }

    updateClock();
    setInterval(updateClock, 1000);
    populate();
    scheduleReload();

    // ── Starfield ──
    const canvas = document.getElementById('starfield');
    const ctx    = canvas.getContext('2d');
    let stars    = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = [];
      const count = Math.floor((canvas.width * canvas.height) / 4500);
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.5 + 0.2,
          opacity: Math.random() * 0.6 + 0.15,
          speed: Math.random() * 0.012 + 0.003,
          phase: Math.random() * Math.PI * 2,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.phase += s.speed;
        const alpha = s.opacity * (0.65 + 0.35 * Math.sin(s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(186, 220, 255, ${alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    resize(); initStars(); draw();
    window.addEventListener('resize', () => { resize(); initStars(); });
  </script>

</body>
</html>
